<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Business Dashboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js for visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .chart-container { position: relative; height: 300px; width: 100%; }
        /* 지수 표기법 방지를 위한 숫자 폰트 최적화 */
        .number-font { font-feature-settings: "tnum"; variant-numeric: tabular-nums; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">실시간 경영 지표 대시보드</h1>
                <p class="text-slate-500">구글 스프레드시트 연동 실시간 데이터 분석</p>
            </div>
            <div class="flex items-center gap-3 bg-white px-4 py-2 rounded-full shadow-sm border border-slate-200">
                <div id="status-dot" class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                <span id="last-update" class="text-sm font-medium text-slate-600">데이터를 불러오는 중...</span>
            </div>
        </header>

        <!-- KPI Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="glass-card p-6 rounded-2xl shadow-sm">
                <div class="flex items-center justify-between mb-4">
                    <div class="p-2 bg-blue-100 rounded-lg text-blue-600"><i data-lucide="trending-up"></i></div>
                    <span class="text-xs font-semibold text-blue-600 bg-blue-50 px-2 py-1 rounded">누적 매출</span>
                </div>
                <h3 class="text-slate-500 text-sm font-medium">현재 매출액</h3>
                <p id="kpi-revenue" class="text-xl xl:text-2xl font-bold text-slate-800 mt-1 number-font">0</p>
            </div>

            <div class="glass-card p-6 rounded-2xl shadow-sm">
                <div class="flex items-center justify-between mb-4">
                    <div class="p-2 bg-emerald-100 rounded-lg text-emerald-600"><i data-lucide="dollar-sign"></i></div>
                    <span class="text-xs font-semibold text-emerald-600 bg-emerald-50 px-2 py-1 rounded">수익성</span>
                </div>
                <h3 class="text-slate-500 text-sm font-medium">영업이익</h3>
                <p id="kpi-profit" class="text-xl xl:text-2xl font-bold text-slate-800 mt-1 number-font">0</p>
            </div>

            <div class="glass-card p-6 rounded-2xl shadow-sm">
                <div class="flex items-center justify-between mb-4">
                    <div class="p-2 bg-purple-100 rounded-lg text-purple-600"><i data-lucide="package"></i></div>
                    <span class="text-xs font-semibold text-purple-600 bg-purple-50 px-2 py-1 rounded">재고 관리</span>
                </div>
                <h3 class="text-slate-500 text-sm font-medium">현재 재고량</h3>
                <p id="kpi-inventory" class="text-xl xl:text-2xl font-bold text-slate-800 mt-1 number-font">0</p>
            </div>

            <div class="glass-card p-6 rounded-2xl shadow-sm">
                <div class="flex items-center justify-between mb-4">
                    <div class="p-2 bg-amber-100 rounded-lg text-amber-600"><i data-lucide="award"></i></div>
                    <span class="text-xs font-semibold text-amber-600 bg-amber-50 px-2 py-1 rounded">신용 등급</span>
                </div>
                <h3 class="text-slate-500 text-sm font-medium">기업 신용 평가</h3>
                <p id="kpi-credit" class="text-xl xl:text-2xl font-bold text-slate-800 mt-1">-</p>
            </div>
        </div>

        <!-- Main Charts Section -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="glass-card p-6 rounded-2xl shadow-sm">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-lg font-bold text-slate-800">매출 및 영업이익 추이</h2>
                    <i data-lucide="bar-chart-3" class="text-slate-400 w-5 h-5"></i>
                </div>
                <div class="chart-container">
                    <canvas id="revenueProfitChart"></canvas>
                </div>
            </div>

            <div class="glass-card p-6 rounded-2xl shadow-sm">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-lg font-bold text-slate-800">판매량 / 생산량 / 재고 현황</h2>
                    <i data-lucide="layers" class="text-slate-400 w-5 h-5"></i>
                </div>
                <div class="chart-container">
                    <canvas id="volumeChart"></canvas>
                </div>
            </div>

            <div class="glass-card p-6 rounded-2xl shadow-sm">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-lg font-bold text-slate-800">직원 생산성 지표</h2>
                    <i data-lucide="users" class="text-slate-400 w-5 h-5"></i>
                </div>
                <div class="chart-container">
                    <canvas id="productivityChart"></canvas>
                </div>
            </div>

            <div class="glass-card p-6 rounded-2xl shadow-sm">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-lg font-bold text-slate-800">재무 건전성 (자산/부채)</h2>
                    <i data-lucide="pie-chart" class="text-slate-400 w-5 h-5"></i>
                </div>
                <div class="chart-container">
                    <canvas id="financialChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRe5lbgi2-_26E4xtx6kAjJEMuwLrhOFEmG_GrAI9wggIwAno4vtwgDOBQfF8LH_z5DKlYyoaNxz3CO/pub?output=csv';
        
        let charts = {};

        lucide.createIcons();

        // 콤마가 포함된 숫자로 포맷팅 (정수형 강제)
        function formatNumber(num) {
            if (isNaN(num)) return "0";
            return new Intl.NumberFormat('ko-KR').format(Math.floor(num));
        }

        // CSV 문자열에서 콤마나 특수문자가 섞인 숫자를 안전하게 파싱
        function parseCleanFloat(str) {
            if (!str) return 0;
            // 숫자, 소수점, 마이너스 기호를 제외한 모든 문자 제거
            const cleanStr = String(str).replace(/[^\d.-]/g, '');
            return parseFloat(cleanStr) || 0;
        }

        async function fetchData() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    processData(results.data);
                },
                error: function(err) {
                    console.error("CSV Loading Error:", err);
                    document.getElementById('last-update').innerText = "연결 오류";
                    document.getElementById('status-dot').className = "w-3 h-3 bg-red-500 rounded-full";
                }
            });
        }

        function processData(rawData) {
            if (!rawData || rawData.length === 0) return;

            const data = rawData.map(row => ({
                ...row,
                매출: parseCleanFloat(row.매출),
                영업이익: parseCleanFloat(row.영업이익),
                판매량: parseCleanFloat(row.판매량),
                재고: parseCleanFloat(row.재고),
                생산량: parseCleanFloat(row.생산량),
                영업직원생산성: parseCleanFloat(row.영업직원생산성),
                생산직원생산성: parseCleanFloat(row.생산직원생산성),
                자산: parseCleanFloat(row.자산),
                부채: parseCleanFloat(row.부채),
                기말현금: parseCleanFloat(row.기말현금)
            }));

            const latest = data[data.length - 1];

            // KPI 업데이트
            document.getElementById('kpi-revenue').innerText = formatNumber(latest.매출);
            document.getElementById('kpi-profit').innerText = formatNumber(latest.영업이익);
            document.getElementById('kpi-inventory').innerText = formatNumber(latest.재고);
            document.getElementById('kpi-credit').innerText = latest.신용등급 || '-';
            
            document.getElementById('last-update').innerText = `최근 업데이트: ${new Date().toLocaleTimeString()}`;
            document.getElementById('status-dot').className = "w-3 h-3 bg-green-500 rounded-full animate-pulse";

            const labels = data.map((_, i) => `${i + 1}회`);

            updateChart('revenueProfitChart', 'line', labels, [
                { label: '매출', data: data.map(d => d.매출), borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.3 },
                { label: '영업이익', data: data.map(d => d.영업이익), borderColor: '#10b981', backgroundColor: 'transparent', tension: 0.3 }
            ]);

            updateChart('volumeChart', 'bar', labels, [
                { label: '판매량', data: data.map(d => d.판매량), backgroundColor: '#6366f1' },
                { label: '생산량', data: data.map(d => d.생산량), backgroundColor: '#a855f7' },
                { label: '재고', data: data.map(d => d.재고), backgroundColor: '#f43f5e' }
            ]);

            updateChart('productivityChart', 'line', labels, [
                { label: '영업직원 생산성', data: data.map(d => d.영업직원생산성), borderColor: '#f59e0b', backgroundColor: 'transparent' },
                { label: '생산직원 생산성', data: data.map(d => d.생산직원생산성), borderColor: '#8b5cf6', backgroundColor: 'transparent' }
            ]);

            updateChart('financialChart', 'bar', labels, [
                { label: '자산', data: data.map(d => d.자산), backgroundColor: '#0ea5e9' },
                { label: '부채', data: data.map(d => d.부채), backgroundColor: '#cbd5e1' }
            ], { stacked: true });
        }

        function updateChart(id, type, labels, datasets, options = {}) {
            if (charts[id]) {
                charts[id].data.labels = labels;
                charts[id].data.datasets = datasets;
                charts[id].update('none');
            } else {
                const ctx = document.getElementById(id).getContext('2d');
                charts[id] = new Chart(ctx, {
                    type: type,
                    data: { labels, datasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { intersect: false, mode: 'index' },
                        plugins: {
                            legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11 } } },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        let label = context.dataset.label || '';
                                        if (label) label += ': ';
                                        if (context.parsed.y !== null) {
                                            label += formatNumber(context.parsed.y);
                                        }
                                        return label;
                                    }
                                }
                            }
                        },
                        scales: {
                            y: { 
                                beginAtZero: true, 
                                stacked: options.stacked || false,
                                ticks: {
                                    callback: function(value) {
                                        // Y축 눈금 단위를 억/만 단위로 축약하거나 콤마 표시
                                        if (value >= 100000000) return (value / 100000000).toLocaleString() + '억';
                                        return value.toLocaleString();
                                    }
                                }
                            },
                            x: { grid: { display: false }, stacked: options.stacked || false }
                        }
                    }
                });
            }
        }

        fetchData();
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
